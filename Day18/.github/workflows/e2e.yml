# Day 18 — E2E Tests: nightly schedule + manual trigger
#
# Runs separately from terraform-test.yml because E2E tests take 15–30 min
# and cost more. Two triggers:
#   - schedule: nightly at 02:00 UTC (catches overnight regressions)
#   - workflow_dispatch: manual trigger for pre-release validation

name: E2E Tests

on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC every night
  workflow_dispatch:        # manual trigger from the Actions tab

jobs:
  e2e-tests:
    name: End-to-End Tests (Terratest)
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION:    us-east-1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: "1.21"
          cache: true
          cache-dependency-path: Day18/test/go.sum

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"
          terraform_wrapper: false   # required so Terratest can parse tf output

      - name: Download Go dependencies
        run: go mod download
        working-directory: Day18/test

      - name: Run E2E Tests
        run: go test -v -timeout 45m -run "TestFullStack" ./...
        working-directory: Day18/test
